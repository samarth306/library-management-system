name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL..."
          for i in {1..30}; do
            if docker exec library_db mysqladmin ping -h localhost --silent; then
              echo "MySQL is ready!"
              exit 0
            fi
            sleep 5
          done
          echo "MySQL did not become ready in time!" && exit 1

      - name: Run end-to-end tests
        run: |
          docker exec -e PYTHONPATH=/app -e ENV=test -w /app library_app \
          sh -c "poetry run python -m unittest discover -s tests -v"


      - name: Stop containers
        if: always()
        run: docker compose down -v
